# Windows 릴리즈 실행 파일을 빌드하고 GitHub Release에 업로드한다.
name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v0.3.0"

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows exe and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if (-not $tag) {
            $tag = "v0.3.0"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -p test_quiz.py
          python -m unittest discover -s tests -p test_resources.py
          python -m unittest discover -s tests -p test_settings.py
          python -m unittest discover -s tests -p test_terminal.py

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm kana-trainer.spec

      - name: Write release notes
        shell: pwsh
        run: |
          @"
          ## 주요 변경

          - 학습 기록과 정답률 요약을 추가했습니다.
          - 조사 뜻 맞히기, 예문 로마자 입력, 헷갈리는 문자 선택 퀴즈를 추가했습니다.
          - 가나 퀴즈를 20문제로 늘리고 세션 내 중복 출제를 막았습니다.
          - 가나 퀴즈에 레벨별 해금 흐름을 추가했습니다.
          - PyInstaller 기반 Windows 실행 파일을 제공합니다.

          ## 실행 파일

          - Windows: KanaTrainer.exe
          "@ | Set-Content -Path release-notes.md -Encoding utf8

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create $env:RELEASE_TAG
          dist/KanaTrainer.exe
          --repo $env:GITHUB_REPOSITORY
          --title "Kana Trainer 0.3.0"
          --notes-file release-notes.md
